<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>รายการคิวผู้ป่วย - คลินิกออนไลน์</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body {
    background: #f4f6f9;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

header {
    background: linear-gradient(135deg, #0D47A1, #1976D2);
    color: white;
    padding: 30px 20px;
    text-align: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.card {
    border-radius: 16px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
    border: none;
}

.queue-badge {
    font-size: 20px;
    font-weight: bold;
    color: #0d6efd;
}

.status-badge {
    font-size: 14px;
    padding: 8px 12px;
    border-radius: 8px;
}
</style>
</head>
<body>

<header>
    <h1 class="h3 mb-1">🏥 รายการคิวผู้ป่วย</h1>
    <p class="mb-0 text-white-50">ตรวจสอบสถานะคิวการเข้ารับบริการ</p>
</header>

<div class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <a href="index.html" class="btn btn-outline-primary">
            ⬅️ กลับหน้าจองคิว
        </a>
        <button onclick="loadBookings()" class="btn btn-success">
            🔄 รีเฟรชข้อมูล
        </button>
    </div>

    <div class="card p-4">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-primary text-center">
                    <tr>
                        <th>ลำดับคิว</th>
                        <th>ชื่อผู้ป่วย</th>
                        <th>วันที่</th>
                        <th>เวลา</th>
                        <th>สถานะ</th>
                    </tr>
                </thead>
                <tbody id="bookingTableBody" class="text-center">
                    <tr>
                        <td colspan="5" class="py-4 text-muted">กำลังโหลดข้อมูลคิว...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
// URL Google Apps Script ของคุณ
const API_URL = "https://script.google.com/macros/s/AKfycbw4N-c8P6tyoflEQ-O62G-G3mnskkmMW-BiZNkkt-LuVpwwznLkDtd3pahgME6FKCl2/exec";

// ฟังก์ชันซ่อนนามสกุลบางส่วนเพื่อความเป็นส่วนตัว
function maskName(fullName) {
    if (!fullName) return "-";
    const parts = fullName.trim().split(" ");
    if (parts.length > 1) {
        return parts[0] + " " + parts[1].substring(0, 1) + "***";
    }
    return parts[0];
}

async function loadBookings() {
    const tbody = document.getElementById("bookingTableBody");
    try {
        const response = await fetch(API_URL + "?action=getBookings");
        const data = await response.json();
        
        tbody.innerHTML = "";

        if (!data || data.length === 0) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="5" class="py-4 text-muted">ยังไม่มีรายการคิวในขณะนี้</td>
                </tr>
            `;
            return;
        }

        data.forEach(item => {
            let badgeClass = "bg-warning text-dark";
            let statusText = item.status || "รอเรียก";

            if (item.status === "กำลังตรวจ") {
                badgeClass = "bg-info text-dark";
            } else if (item.status === "เสร็จสิ้น") {
                badgeClass = "bg-success";
            }

            tbody.innerHTML += `
                <tr>
                    <td class="queue-badge">${item.queue || "-"}</td>
                    <td class="fw-bold">${maskName(item.name)}</td>
                    <td>${item.date || "-"}</td>
                    <td>${item.time || "-"} น.</td>
                    <td>
                        <span class="badge ${badgeClass} status-badge">${statusText}</span>
                    </td>
                </tr>
            `;
        });

    } catch (error) {
        console.error(error);
        tbody.innerHTML = `
            <tr>
                <td colspan="5" class="py-4 text-danger">ไม่สามารถดึงข้อมูลคิวได้ กรุณาลองใหม่อีกครั้ง</td>
            </tr>
        `;
    }
}

// โหลดข้อมูลทันทีเมื่อเปิดหน้า
loadBookings();

// อัปเดตข้อมูลอัตโนมัติทุกๆ 15 วินาที
setInterval(loadBookings, 15000);
</script>

</body>
</html>
