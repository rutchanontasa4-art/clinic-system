<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบจองคิวคลินิกออนไลน์</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    background: #F5F9FC;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

/* ส่วนหัว */
header {
    background: linear-gradient(135deg, #0D47A1, #1976D2);
    padding: 40px 20px;
    text-align: center;
    box-shadow: 0 4px 15px rgba(0,0,0,.15);
}

header h1 {
    color: #FFFFFF;
    font-size: 38px;
    margin: 0;
    font-weight: 700;
}

header p {
    color: #E3F2FD;
    font-size: 18px;
    margin-top: 10px;
}

/* กล่องฟอร์ม */
.container {
    background: #FFFFFF;
    border-radius: 18px;
    padding: 35px;
    margin: 30px auto;
    max-width: 650px;
    box-shadow: 0 10px 25px rgba(0,0,0,.08);
}

h2 {
    color: #0D47A1;
    text-align: center;
    margin-top: 0;
    margin-bottom: 25px;
}

/* ช่องกรอกข้อมูล */
input,
select,
textarea {
    width: 100%;
    border: 1px solid #CFD8DC;
    border-radius: 10px;
    padding: 14px;
    font-size: 16px;
    margin-bottom: 15px;
}

input:focus,
select:focus,
textarea:focus {
    border-color: #1976D2;
    box-shadow: 0 0 8px rgba(25,118,210,.2);
    outline: none;
}

/* กลุ่มปุ่มกด */
.button-group {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 10px;
}

button {
    width: 100%;
    background: #26A69A;
    color: white;
    font-size: 18px;
    font-weight: bold;
    border: none;
    border-radius: 10px;
    padding: 15px;
    cursor: pointer;
    transition: background 0.2s;
}

button:hover {
    background: #00897B;
}

/* ปุ่มดูคิวสำหรับคนไข้ */
.queue-btn {
    background: #0288D1;
}

.queue-btn:hover {
    background: #01579B;
}

/* ส่วนล่างสุด (Footer แบบไม่มีลิงก์เจ้าหน้าที่) */
footer {
    text-align: center;
    padding: 20px;
    color: #78909C;
    font-size: 14px;
    margin-top: 40px;
}
</style>
</head>

<body>

<header>
    <h1>🏥 ระบบจองคิวคลินิกออนไลน์</h1>
    <p>คลินิกรักษาโรคทั่วไป</p>
</header>

<div class="container">

<h2>แบบฟอร์มจองคิว</h2>

<input id="name" placeholder="ชื่อ-นามสกุล">

<input id="phone" placeholder="เบอร์โทรศัพท์">

<input id="email" placeholder="อีเมล">

<textarea
id="symptom"
rows="4"
placeholder="อาการหรือสาเหตุที่มาพบแพทย์ เช่น ไข้ ไอ เจ็บคอ ปวดท้อง">
</textarea>

<input type="date" id="date">

<select id="time">
<option value="">-- เลือกเวลา --</option>
<option>09:00</option>
<option>10:00</option>
<option>11:00</option>
<option>12:00</option>
<option>13:00</option>
<option>14:00</option>
<option>15:00</option>
<option>16:00</option>
<option>17:00</option>
<option>18:00</option>
<option>19:00</option>
<option>20:00</option>
</select>

<div class="button-group">
    <!-- ปุ่มจองคิว -->
    <button onclick="bookQueue()">
        📝 จองคิว
    </button>

    <!-- ปุ่มดูคิวสำหรับคนไข้ -->
    <a href="public-queue.html" style="text-decoration: none;">
        <button type="button" class="queue-btn">
            🔍 ดูรายการคิวผู้ป่วย
        </button>
    </a>
</div>

</div>

<footer>
    <p>© ระบบจองคิวคลินิกออนไลน์</p>
</footer>

<script>

// URL Apps Script ของคุณ
const API_URL = "https://script.google.com/macros/s/AKfycbw4N-c8P6tyoflEQ-O62G-G3mnskkmMW-BiZNkkt-LuVpwwznLkDtd3pahgME6FKCl2/exec";

async function bookQueue(){

    const name = document.getElementById("name").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const email = document.getElementById("email").value.trim();
    const symptom = document.getElementById("symptom").value.trim();
    const date = document.getElementById("date").value;
    const time = document.getElementById("time").value;

    if(!name || !phone || !symptom || !date || !time){
        alert("กรุณากรอกข้อมูลให้ครบ");
        return;
    }

    const data = {
        action: "addBooking",
        name: name,
        phone: phone,
        email: email,
        symptom: symptom,
        date: date,
        time: time
    };

    try {
        const response = await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify(data)
        });

        const result = await response.json();

        if (result.success) {
            alert("จองคิวสำเร็จ");
            document.getElementById("name").value = "";
            document.getElementById("phone").value = "";
            document.getElementById("email").value = "";
            document.getElementById("symptom").value = "";
            document.getElementById("date").value = "";
            document.getElementById("time").selectedIndex = 0;
        } else {
            alert(result.message || "เกิดข้อผิดพลาด");
        }

    } catch (error) {
        console.error(error);
        alert("ไม่สามารถเชื่อมต่อระบบได้");
    }

}

</script>

</body>
</html>
