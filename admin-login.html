<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เข้าสู่ระบบเจ้าหน้าที่</title>

<style>

*{
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    margin:0;
    background:#f0f8ff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:400px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#2196F3;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    background:#2196F3;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1976D2;
}

.back-btn{
    margin-top:10px;
    background:#757575;
}

.back-btn:hover{
    background:#616161;
}

</style>
</head>

<body>

<div class="container">

<h1>👨‍⚕️ เข้าสู่ระบบเจ้าหน้าที่</h1>

<input
type="text"
id="username"
placeholder="ชื่อผู้ใช้">

<input
type="password"
id="password"
placeholder="รหัสผ่าน">

<button onclick="login()">
เข้าสู่ระบบ
</button>

<button
class="back-btn"
onclick="window.location.href='index.html'">
กลับหน้าหลัก
</button>

</div>

<script>

function login(){

    const username =
        document.getElementById("username").value;

    const password =
        document.getElementById("password").value;

    if(
        username === "admin" &&
        password === "1234"
    ){

        sessionStorage.setItem(
            "adminLogin",
            "true"
        );

        alert("เข้าสู่ระบบสำเร็จ");

        window.location.href =
    "queue-dashboard.html";

    }
    else{

        alert(
            "ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง"
        );

    }

}

</script>

</body>
</html>
