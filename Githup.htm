<body>

<h2>แบบฟอร์มจองคิว</h2>

<input id="name" placeholder="ชื่อ-นามสกุล">

id="symptom"
rows="4"
placeholder="อาการหรือสาเหตุที่มาพบแพทย์ เช่น ไข้ ไอ เจ็บคอ ปวดท้อง">
</textarea>

จองคิว

<!-- บัตรคิว -->
<div id="queueCard" style="display:none;max-width:500px;margin:30px auto;background:#fff;padding:25px;border-radius:15px;box-shadow:0 5px 15px rgba(0,0,0,.2);text-align:center;">

<h2>🏥 คลินิกรักษาโรคทั่วไป</h2>

<h1 id="queueNumber" style="color:#2196F3;font-size:50px;"></h1>

<p><b>ชื่อ :</b> <span id="cardName"></span></p>

<p><b>วันที่ :</b> <span id="cardDate"></span></p>

<p><b>เวลา :</b> <span id="cardTime"></span></p>

<p><b>สถานะ :</b> รอรับการตรวจ</p>

<hr>

<button onclick="printQueue()">🖨 พิมพ์บัตรคิว</button>

<button onclick="downloadPDF()">📄 ดาวน์โหลด PDF</button>

</div>


<script>

// เปลี่ยนเป็น URL Apps Script ของคุณ
const API_URL =
"https://script.google.com/macros/s/AKfycbw4N-c8P6tyoflEQ-O62G-G3mnskkmMW-BiZNkkt-LuVpwwznLkDtd3pahgME6FKCl2/exec";
async function bookQueue(){

    const name =
        document.getElementById("name").value.trim();

    const phone =
        document.getElementById("phone").value.trim();

    const email =
        document.getElementById("email").value.trim();

    const symptom =
        document.getElementById("symptom").value.trim();

    const date =
        document.getElementById("date").value;

    const time =
        document.getElementById("time").value;

    if(!name || !phone || !symptom || !date || !time){

        alert("กรุณากรอกข้อมูลให้ครบ");

        return;

    }

    const data = {

        action:"addBooking",

        name:name,
        phone:phone,
        email:email,
        symptom:symptom,
        date:date,
        time:time

    };

    try{

        const response = await fetch(API_URL,{

            method:"POST",

            body:JSON.stringify(data)

        });

        const result = await response.json();

        if(result.success){

    document.querySelector(".container").style.display="none";

    document.getElementById("queueCard").style.display="block";

    document.getElementById("queueNumber").innerText=result.queue;

    document.getElementById("cardName").innerText=result.name;

    document.getElementById("cardDate").innerText=result.date;

    document.getElementById("cardTime").innerText=result.time;


}else{

    alert("เกิดข้อผิดพลาด");

}

    }catch(error){

        console.log(error);

        alert("ไม่สามารถเชื่อมต่อระบบได้");

    }

}

// เพิ่มตรงนี้
function printQueue(){

    window.print();

}


function downloadPDF(){

    const element=document.getElementById("queueCard");

    html2pdf()
    .from(element)
    .save(
    "Queue-"+document.getElementById("queueNumber").innerText+".pdf"
    );

}


</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
