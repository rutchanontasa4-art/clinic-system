<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>รายงานผลประเมินความพึงพอใจ - เจ้าหน้าที่</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body {
    background-color: #f4f6f9;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

header {
    background: linear-gradient(135deg, #0D47A1, #1976D2);
    color: white;
    padding: 25px 20px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.card {
    border-radius: 16px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
    border: none;
}

.score-badge {
    font-size: 16px;
    font-weight: bold;
}
</style>
</head>
<body>

<header class="mb-4">
    <div class="container d-flex justify-content-between align-items-center">
        <div>
            <h1 class="h3 mb-0">📊 รายงานผลประเมินความพึงพอใจ</h1>
            <small class="text-white-50">สำหรับเจ้าหน้าที่บริหารจัดการ</small>
        </div>
        <div>
            <!-- ปุ่มสลับไปหน้าจัดการคิว -->
            <a href="queue-dashboard.html" class="btn btn-outline-light me-2">
                🏥 ไปหน้าจัดการคิว
            </a>
            <button onclick="logout()" class="btn btn-danger">
                🚪 ออกจากระบบ
            </button>
        </div>
    </div>
</header>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="text-primary m-0">⭐ สรุปผลการประเมินจากคนไข้</h4>
        <button onclick="loadSatisfaction()" class="btn btn-success">
            🔄 รีเฟรชข้อมูล
        </button>
    </div>

    <!-- สรุปคะแนนเฉลี่ย -->
    <div class="row mb-4">
        <div class="col-md-6 mb-3">
            <div class="card p-3 text-center bg-white">
                <h6 class="text-muted">จำนวนผู้ตอบแบบประเมินทั้งหมด</h6>
                <h2 id="totalCount" class="text-primary fw-bold mb-0">0 คน</h2>
            </div>
        </div>
        <div class="col-md-6 mb-3">
            <div class="card p-3 text-center bg-white">
                <h6 class="text-muted">คะแนนความพึงพอใจเฉลี่ยรวม</h6>
                <h2 id="avgScore" class="text-warning fw-bold mb-0">0.0 / 5.0 ⭐</h2>
            </div>
        </div>
    </div>

    <!-- ตารางแสดงรายการประเมิน -->
    <div class="card p-4">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-primary text-center">
                    <tr>
                        <th>วันที่/เวลา</th>
                        <th>ระดับความพึงพอใจ</th>
                        <th>คะแนน</th>
                        <th>ข้อเสนอแนะ / ความคิดเห็น</th>
                        <th>จัดการ</th>
                    </tr>
                </thead>
                <tbody id="satisfactionTableBody" class="text-center">
                    <tr>
                        <td colspan="5" class="py-4 text-muted">กำลังโหลดข้อมูลการประเมิน...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
/* =========================
   1. ตรวจสอบสิทธิ์การเข้าสู่ระบบ
========================= */
if (sessionStorage.getItem("adminLogin") !== "true") {
    window.location.href = "admin-login.html";
}

/* =========================
   2. URL Google Apps Script
========================= */
const API_URL = "https://script.google.com/macros/s/AKfycbw4N-c8P6tyoflEQ-O62G-G3mnskkmMW-BiZNkkt-LuVpwwznLkDtd3pahgME6FKCl2/exec";

/* =========================
   3. โหลดข้อมูลผลประเมิน
========================= */
async function loadSatisfaction() {
    const tbody = document.getElementById("satisfactionTableBody");
    try {
        const response = await fetch(API_URL + "?action=getSatisfaction");
        const data = await response.json();

        tbody.innerHTML = "";

        if (!data || data.length === 0) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="5" class="py-4 text-muted">ยังไม่มีรายการแบบประเมินในขณะนี้</td>
                </tr>
            `;
            document.getElementById("totalCount").innerText = "0 คน";
            document.getElementById("avgScore").innerText = "0.0 / 5.0 ⭐";
            return;
        }

        let totalScore = 0;

        data.forEach(item => {
            const score = parseInt(item.score) || 0;
            totalScore += score;

            let badgeClass = "bg-secondary";
            if (score >= 4) badgeClass = "bg-success";
            else if (score === 3) badgeClass = "bg-warning text-dark";
            else if (score < 3) badgeClass = "bg-danger";

            tbody.innerHTML += `
                <tr>
                    <td>${item.timestamp || item.date || "-"}</td>
                    <td><span class="badge ${badgeClass} score-badge">${item.ratingText || item.level || "ประเมิน"}</span></td>
                    <td class="fw-bold">${score} / 5</td>
                    <td class="text-start">${item.comment || item.suggestion || "-"}</td>
                    <td>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteSatisfaction('${item.id}')">
                            🗑️ ลบ
                        </button>
                    </td>
                </tr>
            `;
        });

        const count = data.length;
        const avg = (totalScore / count).toFixed(1);
        document.getElementById("totalCount").innerText = count + " คน";
        document.getElementById("avgScore").innerText = avg + " / 5.0 ⭐";

    } catch (error) {
        console.error(error);
        tbody.innerHTML = `
            <tr>
                <td colspan="5" class="py-4 text-danger">ไม่สามารถดึงข้อมูลผลประเมินได้</td>
            </tr>
        `;
    }
}

/* =========================
   4. ลบรายการประเมิน
========================= */
async function deleteSatisfaction(id) {
    if (!confirm("คุณต้องการลบรายการประเมินนี้ใช่หรือไม่?")) {
        return;
    }

    try {
        const response = await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify({
                action: "deleteSatisfaction",
                id: id
            })
        });

        const result = await response.json();

        if (result.success) {
            alert("ลบรายการเรียบร้อยแล้ว");
            loadSatisfaction();
        } else {
            alert(result.message || "ไม่สามารถลบข้อมูลได้");
        }
    } catch (error) {
        console.error(error);
        alert("เกิดข้อผิดพลาดในการเชื่อมต่อระบบ");
    }
}

/* =========================
   5. ออกจากระบบ
========================= */
function logout() {
    sessionStorage.removeItem("adminLogin");
    window.location.href = "admin-login.html";
}

loadSatisfaction();
</script>

</body>
</html>
