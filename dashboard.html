<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>รายงานผลประเมินความพึงพอใจ - เจ้าหน้าที่</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

body {

    background-color: #f4f6f9;

    font-family: 'Segoe UI',
    Tahoma,
    Geneva,
    Verdana,
    sans-serif;

}

header {

    background: linear-gradient(
        135deg,
        #0D47A1,
        #1976D2
    );

    color: white;

    padding: 25px 20px;

    box-shadow: 0 4px 10px rgba(0,0,0,0.1);

}

.card {

    border-radius: 16px;

    box-shadow: 0 8px 20px rgba(0,0,0,0.06);

    border: none;

}

.score-badge {

    font-size: 16px;

    font-weight: bold;

}

</style>

</head>


<body>


<header class="mb-4">

    <div class="container d-flex justify-content-between align-items-center">

        <div>

            <h1 class="h3 mb-0">

                📊 รายงานผลประเมินความพึงพอใจ

            </h1>

            <small class="text-white-50">

                สำหรับเจ้าหน้าที่บริหารจัดการ

            </small>

        </div>


        <div>

            <a href="queue-dashboard.html"
               class="btn btn-outline-light me-2">

                🏥 ไปหน้าจัดการคิว

            </a>


            <button onclick="logout()"
                    class="btn btn-danger">

                🚪 ออกจากระบบ

            </button>

        </div>

    </div>

</header>


<div class="container">


    <div class="d-flex justify-content-between align-items-center mb-3">

        <h4 class="text-primary m-0">

            ⭐ สรุปผลการประเมินจากคนไข้

        </h4>


        <button onclick="loadSatisfaction()"
                class="btn btn-success">

            🔄 รีเฟรชข้อมูล

        </button>

    </div>


    <div class="row mb-4">


        <div class="col-md-6 mb-3">

            <div class="card p-3 text-center bg-white">

                <h6 class="text-muted">

                    จำนวนผู้ตอบแบบประเมินทั้งหมด

                </h6>


                <h2 id="totalCount"
                    class="text-primary fw-bold mb-0">

                    0 คน

                </h2>

            </div>

        </div>


        <div class="col-md-6 mb-3">

            <div class="card p-3 text-center bg-white">

                <h6 class="text-muted">

                    คะแนนความพึงพอใจเฉลี่ยรวม

                </h6>


                <h2 id="avgScore"
                    class="text-warning fw-bold mb-0">

                    0.0 / 5.0 ⭐

                </h2>

            </div>

        </div>

    </div>


    <div class="card p-4">

        <div class="table-responsive">

            <table class="table table-hover align-middle mb-0">


                <thead class="table-primary text-center">

                    <tr>

                        <th>วันที่/เวลา</th>

                        <th>ชื่อ</th>

                        <th>คิว</th>

                        <th>คะแนนรวม</th>

                        <th>บริการ</th>

                        <th>เจ้าหน้าที่</th>

                        <th>ความสะอาด</th>

                        <th>ความคิดเห็น</th>

                        <th>จัดการ</th>

                    </tr>

                </thead>


                <tbody id="satisfactionTableBody"
                       class="text-center">

                    <tr>

                        <td colspan="9"
                            class="py-4 text-muted">

                            กำลังโหลดข้อมูลการประเมิน...

                        </td>

                    </tr>

                </tbody>


            </table>

        </div>

    </div>

</div>


<script>


// ==========================================
// ตรวจสอบสิทธิ์
// ==========================================
if (sessionStorage.getItem("adminLogin") !== "true") {

    window.location.href = "admin-login.html";

}


// ==========================================
// URL Google Apps Script
// ==========================================
const API_URL =
"https://script.google.com/macros/s/AKfycbw4N-c8P6tyoflEQ-O62G-G3mnskkmMW-BiZNkkt-LuVpwwznLkDtd3pahgME6FKCl2/exec";


// ==========================================
// โหลดข้อมูลผลประเมิน
// ==========================================
async function loadSatisfaction() {


    const tbody =
    document.getElementById(
        "satisfactionTableBody"
    );


    try {


        const response =
        await fetch(
            API_URL +
            "?action=getSatisfaction"
        );


        const data =
        await response.json();


        console.log(
            "ข้อมูลผลประเมิน:",
            data
        );


        tbody.innerHTML = "";


        if (
            !data ||
            data.length === 0
        ) {


            tbody.innerHTML = `

                <tr>

                    <td colspan="9"
                        class="py-4 text-muted">

                        ยังไม่มีข้อมูลผลประเมิน

                    </td>

                </tr>

            `;


            document
            .getElementById(
                "totalCount"
            )
            .innerText = "0 คน";


            document
            .getElementById(
                "avgScore"
            )
            .innerText =
            "0.0 / 5.0 ⭐";


            return;

        }


        let totalScore = 0;


        data.forEach(item => {


            const score =
            parseFloat(
                item.score
            ) || 0;


            totalScore += score;


            let badgeClass =
            "bg-secondary";


            if (score >= 4) {

                badgeClass =
                "bg-success";

            }

            else if (score == 3) {

                badgeClass =
                "bg-warning text-dark";

            }

            else if (score < 3) {

                badgeClass =
                "bg-danger";

            }


            tbody.innerHTML += `

                <tr>

                    <td>

                        ${item.timestamp || "-"}

                    </td>


                    <td>

                        ${item.name || "-"}

                    </td>


                    <td>

                        ${item.queue || "-"}

                    </td>


                    <td>

                        <span class="badge
                        ${badgeClass}
                        score-badge">

                            ${score} / 5

                        </span>

                    </td>


                    <td>

                        ${item.service || "-"}

                    </td>


                    <td>

                        ${item.staff || "-"}

                    </td>


                    <td>

                        ${item.cleanliness || "-"}

                    </td>


                    <td class="text-start">

                        ${item.comment || "-"}

                    </td>


                    <td>

                        <button

                            class="btn
                            btn-sm
                            btn-outline-danger"

                            onclick=
                            "deleteSatisfaction
                            ('${item.id}')">

                            🗑️ ลบ

                        </button>

                    </td>

                </tr>

            `;

        });


        const count =
        data.length;


        const avg =
        (
            totalScore /
            count
        ).toFixed(1);


        document
        .getElementById(
            "totalCount"
        )
        .innerText =
        count + " คน";


        document
        .getElementById(
            "avgScore"
        )
        .innerText =
        avg +
        " / 5.0 ⭐";


    }


    catch (error) {


        console.error(
            "เกิดข้อผิดพลาด:",
            error
        );


        tbody.innerHTML = `

            <tr>

                <td colspan="9"
                    class="py-4 text-danger">

                    ไม่สามารถดึงข้อมูลผลประเมินได้

                </td>

            </tr>

        `;

    }

}


// ==========================================
// ลบผลประเมิน
// ==========================================
async function deleteSatisfaction(id) {


    if (

        !confirm(
            "คุณต้องการลบรายการประเมินนี้ใช่หรือไม่?"
        )

    ) {

        return;

    }


    try {


        const response =
        await fetch(

            API_URL,

            {

                method: "POST",

                body: JSON.stringify({

                    action:
                    "deleteSatisfaction",

                    id:
                    id

                })

            }

        );


        const result =
        await response.json();


        if (result.success) {


            alert(
                "ลบรายการเรียบร้อยแล้ว"
            );


            loadSatisfaction();


        }


        else {


            alert(

                result.message ||
                "ไม่สามารถลบข้อมูลได้"

            );

        }


    }


    catch (error) {


        console.error(error);


        alert(

            "เกิดข้อผิดพลาดในการเชื่อมต่อระบบ"

        );

    }

}


// ==========================================
// ออกจากระบบ
// ==========================================
function logout() {


    sessionStorage.removeItem(
        "adminLogin"
    );


    window.location.href =
    "admin-login.html";

}


// ==========================================
// โหลดข้อมูลทันที
// ==========================================
loadSatisfaction();


</script>


</body>

</html>
